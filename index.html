<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Jay 💖</title>

<style>
body {
    font-family: 'Comic Sans MS', cursive;
    text-align: center;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
}

.yes {
    background-color: #ff69b4;
    color: white;
}

.no {
    background-color: #444;
    color: white;
}

img {
    width: 220px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container" id="main">
    <h2>I made something special for you 💝<br>Do you wanna see it?</h2>

    <button class="yes" onclick="yesClick()">Yes 💖</button>
    <button class="no" onclick="noClick()">No 😒</button>

    <img src="firstpic.png">
</div>

<script>

function yesClick() {
    document.getElementById("main").innerHTML = `
        <h1>🎉 HAPPY BIRTHDAY JAY 🎂💖</h1>
        <p>You mean a lot to me 🥺✨<br>Hope your day is amazing!</p>
        <img src="firstpic.jfif">
    `;
}

function noClick() {
    document.getElementById("main").innerHTML = `
        <h2>Why did you click NO!? 😭<br>Try again!!</h2>
        <button class="yes" onclick="yesClick()">Okay Okay YES 💖</button>
        <br>
        <img src="so-funny-cute.gif">
    `;
}

</script>

</body>
</html>
